<!DOCTYPE html>
<html>
<head>
<title>AI Patch Management Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
.card-kpi {
    color: white;
    border-radius: 12px;
}
.kpi1 { background: #28a745; }
.kpi2 { background: #dc3545; }
.kpi3 { background: #ffc107; color:black; }

.badge-risk-high { background: red; }
.badge-risk-medium { background: orange; }
.badge-risk-low { background: green; }

</style>
</head>

<body class="container mt-4">

<h2 class="mb-4">🚀 AI Patch Management Dashboard</h2>

<!-- KPI CARDS -->
<div class="row mb-4">
    <div class="col-md-4">
        <div class="card card-kpi kpi1 p-3">
            <h5><i class="bi bi-shield-check"></i> Compliance</h5>
            <h3 id="compliance">0%</h3>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card card-kpi kpi2 p-3">
            <h5><i class="bi bi-exclamation-triangle"></i> High Risk</h5>
            <h3 id="highRisk">0</h3>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card card-kpi kpi3 p-3">
            <h5><i class="bi bi-clock"></i> Pending</h5>
            <h3 id="pending">0</h3>
        </div>
    </div>
</div>

<!-- CREATE PATCH -->
<div class="card p-3 mb-4">
<h4>Create Patch</h4>

<input id="title" class="form-control mb-2" placeholder="Patch Title">

<select id="severity" class="form-control mb-2">
<option>Critical</option>
<option>High</option>
<option>Medium</option>
<option>Low</option>
</select>

<input id="cvss" type="number" class="form-control mb-2" placeholder="CVSS Score (1-10)">

<button class="btn btn-primary w-100" onclick="createPatch()">Submit</button>
</div>

<!-- CVSS INFO -->
<div class="card p-3 mb-4">
<h5>📊 CVSS Score Guide</h5>
<ul>
<li><b>0-3:</b> Low Risk</li>
<li><b>4-6:</b> Medium Risk</li>
<li><b>7-8:</b> High Risk</li>
<li><b>9-10:</b> Critical Risk</li>
</ul>
</div>

<!-- SEARCH -->
<input class="form-control mb-3" placeholder="Search patches..." onkeyup="loadPatches(this.value)">

<!-- TABLE -->
<table class="table table-hover">
<thead class="table-dark">
<tr>
<th>ID</th>
<th>Title</th>
<th>Risk</th>
<th>AI Decision</th>
<th>Status</th>
<th>Explanation</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

// AI Explanation
function explain(p) {
    if (p.risk_score > 80)
        return "Critical vulnerability. Immediate patching required.";
    if (p.risk_score > 50)
        return "Moderate risk. Review recommended.";
    return "Low risk. Can be deferred.";
}

// Risk Badge
function riskBadge(score){
    if(score > 80) return '<span class="badge badge-risk-high">High</span>';
    if(score > 50) return '<span class="badge badge-risk-medium">Medium</span>';
    return '<span class="badge badge-risk-low">Low</span>';
}

async function createPatch() {
    await fetch('/patch', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            title: title.value,
            severity: severity.value,
            cvss: cvss.value
        })
    });
    loadPatches();
}

async function loadPatches(filter="") {
    const res = await fetch('/patches');
    const data = await res.json();

    let rows = '';
    let highRisk=0, pending=0, approved=0;

    data.filter(p => p.title.toLowerCase().includes(filter.toLowerCase()))
    .forEach(p => {

        if(p.risk_score > 80) highRisk++;
        if(p.status === "Submitted") pending++;
        if(p.status === "Approved") approved++;

        rows += `<tr>
        <td>${p.id}</td>
        <td>${p.title}</td>
        <td>${riskBadge(p.risk_score)} (${p.risk_score})</td>
        <td>${p.recommendation}</td>
        <td><span class="badge bg-info">${p.status}</span></td>
        <td>${explain(p)}</td>
        <td>
            <button onclick="update(${p.id},'Approved')" class="btn btn-success btn-sm">Approve</button>
            <button onclick="update(${p.id},'Rejected')" class="btn btn-danger btn-sm">Reject</button>
        </td>
        </tr>`;
    });

    table.innerHTML = rows;

    // KPI Updates
    let total = data.length || 1;
    document.getElementById("compliance").innerText = Math.round((approved/total)*100) + "%";
    document.getElementById("highRisk").innerText = highRisk;
    document.getElementById("pending").innerText = pending;
}

async function update(id,status){
    await fetch('/patch/'+id,{
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({status})
    });
    loadPatches();
}

loadPatches();

</script>

</body>
</html>
