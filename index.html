<script>

// CREATE REQUEST
function createRequest() {
    fetch("/create-request", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            employee_name: document.getElementById("empName").value,
            employee_id: document.getElementById("empId").value,
            request_type: document.getElementById("type").value,
            description: document.getElementById("desc").value,
            justification: document.getElementById("just").value,
            priority: document.getElementById("priority").value
        })
    })
    .then(res => res.json())
    .then(data => {
        alert("✅ Created ID: " + data.id);
        loadRequests();
    });
}

// LOAD DATA
function loadRequests() {
    fetch("/requests")
    .then(res => res.json())
    .then(data => {

        let selectedStatus = document.getElementById("statusFilter").value;

        let table = document.getElementById("tableBody");
        table.innerHTML = "";

        data
        .filter(r => selectedStatus === "All" || r.status === selectedStatus)
        .forEach(r => {

            let actions = `
                <button class="btn btn-success btn-sm" onclick="updateStatus(${r.id}, 'Approved')">Approve</button>
                <button class="btn btn-danger btn-sm" onclick="updateStatus(${r.id}, 'Rejected')">Reject</button>
                <button class="btn btn-info btn-sm" onclick="updateStatus(${r.id}, 'Closed')">Close</button>
            `;

            let badgeColor = "bg-secondary";

            if (r.status === "Approved") badgeColor = "bg-success";
            if (r.status === "Rejected") badgeColor = "bg-danger";
            if (r.status === "Closed") badgeColor = "bg-dark";

            let row = `
                <tr>
                    <td>${r.id}</td>
                    <td>${r.employee_name || "N/A"} (${r.employee_id || "N/A"})</td>
                    <td>${r.request_type}</td>
                    <td>${r.priority}</td>
                    <td><span class="badge ${badgeColor}">${r.status}</span></td>
                    <td>${actions}</td>
                </tr>
            `;

            table.innerHTML += row;
        });
    });
}

// UPDATE STATUS
function updateStatus(id, status) {
    fetch("/update-status", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id, status })
    })
    .then(() => loadRequests());
}

// 🤖 AI PRIORITY SUGGESTION (SIMPLE LOGIC)
function suggestPriority() {
    let text = document.getElementById("desc").value.toLowerCase();

    let priority = "Low";

    if (text.includes("urgent") || text.includes("immediate") || text.includes("production")) {
        priority = "High";
    } else if (text.includes("access") || text.includes("issue")) {
        priority = "Medium";
    }

    document.getElementById("priority").value = priority;

    alert("🤖 AI Suggested Priority: " + priority);
}
