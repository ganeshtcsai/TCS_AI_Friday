<!DOCTYPE html>
<html>
<head>
<title>Patch Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Patch Management Dashboard</h2>

<div class="card p-3 mb-3">
<h4>Create Patch</h4>
<input id="title" class="form-control mb-2" placeholder="Patch Title">
<select id="severity" class="form-control mb-2">
<option>Critical</option>
<option>High</option>
<option>Medium</option>
<option>Low</option>
</select>
<input id="cvss" type="number" class="form-control mb-2" placeholder="CVSS Score">

<button class="btn btn-primary" onclick="createPatch()">Submit</button>
</div>

<input class="form-control mb-2" placeholder="Search..." onkeyup="loadPatches(this.value)">

<table class="table table-bordered">
<thead>
<tr>
<th>ID</th><th>Title</th><th>Risk</th><th>AI</th><th>Status</th><th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
async function createPatch() {
    await fetch('/patch', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            title: title.value,
            severity: severity.value,
            cvss: cvss.value
        })
    });
    loadPatches();
}

async function loadPatches(filter="") {
    const res = await fetch('/patches');
    const data = await res.json();

    let rows = '';
    data.filter(p => p.title.toLowerCase().includes(filter.toLowerCase()))
    .forEach(p => {
        rows += `<tr>
        <td>${p.id}</td>
        <td>${p.title}</td>
        <td>${p.risk_score}</td>
        <td>${p.recommendation}</td>
        <td>${p.status}</td>
        <td>
            <button onclick="update(${p.id},'Approved')" class="btn btn-success btn-sm">Approve</button>
            <button onclick="update(${p.id},'Rejected')" class="btn btn-danger btn-sm">Reject</button>
        </td>
        </tr>`;
    });

    table.innerHTML = rows;
}

async function update(id,status){
    await fetch('/patch/'+id,{
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({status})
    });
    loadPatches();
}

loadPatches();
</script>

</body>
</html>
